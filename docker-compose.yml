services:
  mysql:
    image: mysql:8
    container_name: dailyyam-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dailyyam
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack:latest
    container_name: dailyyam-redis
    restart: unless-stopped
    ports:
      - "6379:6379"   # Redis (RediSearch 포함)
      - "8001:8001"   # RedisInsight UI
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: dailyyam-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: jdbc:mysql://mysql:3306/dailyyam?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads   # 업로드된 식단 사진 영속화

volumes:
  mysql-data:
  redis-data:
